    }

    .message {
      font-size: 18px;
      letter-spacing: 0.03em;
      line-height: 1.6;
      padding: 0 24px;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards 0.2s;
    }

    .dot-ani::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }

  /* ============================================================
     ? [수정 2] 글로벌 사이트 (목록에 없는 모든 국가 + 예외 상황)
     ----------------------------------------------------------
     ??  현재 설정: https://en.aalok.com/
     ??  아래 모든 예외 상황에서도 이 URL 로 이동함:
         - 목록에 없는 국가
         - IP API 한도 초과 (하루 60,000회 초과시)
         - IP API 오류 / 응답 없음
         - 4초 안에 응답 없을 때
  ============================================================ */
  var GLOBAL = {
    url:  'https://en.aalok.com/',
    text: 'Redirecting you to our global store.'
  };


  /* ============================================================
     ??  여기서부터는 수정하지 않아도 됩니다
  ============================================================ */

  var msgEl  = document.getElementById('msg');
  var isDone = false;

  // 안전망: 4초 안에 응답 없으면 글로벌로 강제 이동
  var safeTimer = setTimeout(function() {
    if (!isDone) go(GLOBAL);
  }, 4000);

  // STEP 1 ── IP API 로 국가 판단
  // freeipapi.com | 무료 | 가입불필요 | 하루 60,000회
  fetch('https://api.country.is/')
    .then(function(res) {
      if (!res.ok) {
        console.warn('[IP API] HTTP error:', res.status);
        go(GLOBAL);
        return null;
      }
      return res.json();
    })
    .then(function(data) {
      if (!data) return;

     var cc = data.country;

      // 한도 초과 또는 빈 응답
      if (!cc || cc.length !== 2) {
        console.warn('[IP API] 한도 초과 또는 빈 응답. 글로벌로 이동.');
        go(GLOBAL);
        return;
      }

      // STEP 2 ── 국가 매핑 찾기
      var target = REDIRECT[cc];
      go(target || GLOBAL);
    })
    .catch(function(err) {
      console.warn('[IP API] 네트워크 에러:', err);
      go(GLOBAL);
    });

  // 텍스트 출력 후 즉시 리다이렉트
  function go(target) {
    if (isDone) return;
    isDone = true;
    clearTimeout(safeTimer);
    msgEl.innerHTML = target.text;
    setTimeout(function() {
      window.location.href = target.url;
    }, 300);
  }
